<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accounts Management Org Chart — With Compensation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }
    header { margin-bottom: 36px; text-align: center; }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a2e4a;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    header p { font-size: 0.8rem; color: #7a8ea0; margin-top: 4px; }
    .legend {
      display: flex;
      gap: 28px;
      margin-top: 32px;
      font-size: 0.75rem;
      color: #5a7089;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-solid { width: 36px; height: 2px; background: #b0c4de; }
    .legend-dotted { width: 36px; height: 0; border-top: 2px dashed #b0c4de; }
    .legend-dashed-red { width: 36px; height: 0; border-top: 2px dashed #dc2626; }
    .legend-red-text { color: #dc2626; font-weight: 600; }
    footer { margin-top: 28px; font-size: 0.72rem; color: #a0b0c0; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>Accounts Management Team — Compensation</h1>
  <p>MallPlus · FinCom Technologies Inc. · Confidential</p>
</header>

<svg
  viewBox="0 0 960 560"
  width="100%"
  style="max-width:1000px; display:block;"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Segoe UI', Arial, sans-serif"
>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.11)"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!--  DIRECTOR — Mhike Estipular            -->
  <!--  Box taller to fit 4 lines (salary)   -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="360" y="25" width="240" height="85" rx="12" fill="#00AFA0" filter="url(#shadow)"/>
  <text x="480" y="52" text-anchor="middle" fill="white" font-weight="700" font-size="15">Mhike Estipular</text>
  <text x="480" y="70" text-anchor="middle" fill="white" font-size="11" opacity="0.85">Director, Accounts Management</text>
  <text x="480" y="88" text-anchor="middle" fill="white" font-size="13" font-weight="700">₱200,000</text>

  <!-- V-line: Director → fork -->
  <line x1="480" y1="110" x2="480" y2="140" stroke="#b0c4de" stroke-width="2"/>
  <line x1="230" y1="140" x2="720" y2="140" stroke="#b0c4de" stroke-width="2"/>
  <line x1="230" y1="140" x2="230" y2="170" stroke="#b0c4de" stroke-width="2"/>
  <line x1="720" y1="140" x2="720" y2="170" stroke="#b0c4de" stroke-width="2"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  SALLY — Category Manager              -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="120" y="170" width="220" height="85" rx="12" fill="#26C0B0" filter="url(#shadow)"/>
  <text x="230" y="197" text-anchor="middle" fill="white" font-weight="700" font-size="14">Sally Gardose</text>
  <text x="230" y="215" text-anchor="middle" fill="white" font-size="10.5" opacity="0.9">Category Manager</text>
  <text x="230" y="232" text-anchor="middle" fill="white" font-size="10" opacity="0.80">FA, FMCG, LS/GM</text>
  <text x="230" y="248" text-anchor="middle" fill="white" font-size="13" font-weight="700">₱170,000</text>

  <!-- ═══════════════════════════════════════ -->
  <!--  MERGEL — Jr. Category Manager         -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="610" y="170" width="220" height="85" rx="12" fill="#4DD0C0" filter="url(#shadow)"/>
  <text x="720" y="197" text-anchor="middle" fill="white" font-weight="700" font-size="14">Mergel Romero</text>
  <text x="720" y="215" text-anchor="middle" fill="white" font-size="10.5" opacity="0.9">Jr. Category Manager</text>
  <text x="720" y="232" text-anchor="middle" fill="white" font-size="10" opacity="0.80">EL &amp; HA</text>
  <text x="720" y="248" text-anchor="middle" fill="white" font-size="13" font-weight="700">₱75,000</text>

  <!-- Dotted line: Sally → Mergel -->
  <path d="M340,212 L480,212 L480,212 L610,212"
    fill="none" stroke="#b0c4de" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="610,212 602,208 602,216" fill="#b0c4de"/>

  <!-- Sally → AMs at y=360, w=130, 18px gaps -->
  <!-- Centers: cx=100, cx=230, cx=360 -->
  <line x1="230" y1="255" x2="230" y2="335" stroke="#b0c4de" stroke-width="2"/>
  <line x1="100" y1="335" x2="360" y2="335" stroke="#b0c4de" stroke-width="2"/>
  <line x1="100" y1="335" x2="100" y2="360" stroke="#b0c4de" stroke-width="2"/>
  <line x1="230" y1="335" x2="230" y2="360" stroke="#b0c4de" stroke-width="2"/>
  <line x1="360" y1="335" x2="360" y2="360" stroke="#b0c4de" stroke-width="2"/>

  <!-- Sally AM1 — [TBH] Fashion  (no salary → TBD) -->
  <rect x="35" y="360" width="130" height="78" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="100" y="384" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">[TBH]</text>
  <text x="100" y="400" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="100" y="415" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Fashion</text>
  <text x="100" y="431" text-anchor="middle" fill="#5a7089" font-size="10" font-weight="600">—</text>

  <!-- Sally AM2 — [TBH] FMCG -->
  <rect x="165" y="360" width="130" height="78" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="230" y="384" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">[TBH]</text>
  <text x="230" y="400" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="230" y="415" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">FMCG</text>
  <text x="230" y="431" text-anchor="middle" fill="#5a7089" font-size="10" font-weight="600">—</text>

  <!-- Sally AM3 — Andrei Bautista Lifestyle -->
  <rect x="295" y="360" width="130" height="78" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="384" text-anchor="middle" fill="#2563eb" font-weight="700" font-size="12">Andrei Bautista</text>
  <text x="360" y="400" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="360" y="415" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Lifestyle</text>
  <text x="360" y="431" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">₱25,000</text>

  <!-- Mergel → AMs at y=360 -->
  <!-- Centers: cx=580, cx=720, cx=860 -->
  <line x1="720" y1="255" x2="720" y2="335" stroke="#b0c4de" stroke-width="2"/>
  <line x1="580" y1="335" x2="860" y2="335" stroke="#b0c4de" stroke-width="2"/>
  <line x1="580" y1="335" x2="580" y2="360" stroke="#b0c4de" stroke-width="2"/>
  <line x1="720" y1="335" x2="720" y2="360" stroke="#b0c4de" stroke-width="2"/>
  <line x1="860" y1="335" x2="860" y2="360" stroke="#b0c4de" stroke-width="2"/>

  <!-- Mergel AM1 — Carlo Meguizo — Electronics — 25K -->
  <rect x="515" y="360" width="130" height="78" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="384" text-anchor="middle" fill="#2563eb" font-weight="700" font-size="12">Carlo Meguizo</text>
  <text x="580" y="400" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="580" y="415" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Electronics</text>
  <text x="580" y="431" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">₱25,000</text>

  <!-- Mergel AM2 — [TBH] — Electronics -->
  <rect x="655" y="360" width="130" height="78" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="720" y="384" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">[TBH]</text>
  <text x="720" y="400" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="720" y="415" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Electronics</text>
  <text x="720" y="431" text-anchor="middle" fill="#5a7089" font-size="10" font-weight="600">—</text>

  <!-- Mergel AM3 — Jon Dexter Jacob — Home Appliances — 25K -->
  <rect x="795" y="360" width="130" height="78" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" filter="url(#shadow)"/>
  <text x="860" y="384" text-anchor="middle" fill="#2563eb" font-weight="700" font-size="12">Jon Dexter Jacob</text>
  <text x="860" y="400" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="860" y="415" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Home Appliances</text>
  <text x="860" y="431" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">₱25,000</text>

  <!-- Bottom summary bar -->
  <rect x="230" y="475" width="500" height="40" rx="8" fill="#1a2e4a" opacity="0.08"/>
  <text x="480" y="500" text-anchor="middle" fill="#1a2e4a" font-size="12" font-weight="600">Total filled: ₱520,000 · 3 TBH slots open</text>

</svg>

<div class="legend">
  <div class="legend-item">
    <div class="legend-solid"></div>
    <span>Direct reporting line</span>
  </div>
  <div class="legend-item">
    <div class="legend-dotted"></div>
    <span>Functional authority (Sally → Mergel)</span>
  </div>
  <div class="legend-item">
    <div class="legend-dashed-red"></div>
    <span class="legend-red-text">To be hired</span>
  </div>
</div>

<footer>
  MallPlus · Accounts Management · Confidential — For Internal Presentation Only
</footer>

</body>
</html>
